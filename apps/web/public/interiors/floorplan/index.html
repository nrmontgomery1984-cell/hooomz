<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hooomz OS — Floor Plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F0EDE8;
  --surface:#FAF8F5;
  --surface-2:#EAE4DB;
  --charcoal:#1A1714;
  --dark-nav:#111010;
  --mid:#5C5349;
  --muted:#9A8E84;
  --faint:#D4CEC7;
  --border:#E0DCD7;
  --accent:#6B6560;
  --accent-bg:rgba(107,101,96,.09);
  --accent-border:rgba(107,101,96,.22);
  --green:#16A34A;
  --green-bg:rgba(22,163,74,.08);
  --amber:#D97706;
  --red:#DC2626;
  --blue:#4A7FA5;
  --font-display:'Figtree',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --font-body:'Figtree',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --font-mono:'DM Mono','SF Mono',ui-monospace,monospace;
  --radius:10px;
  --radius-sm:6px;
  --c-pending:#9CA3AF;  /* floorplan-specific — no canonical equivalent */
  --c-floor:#14B8A6;    /* floorplan-specific — no canonical equivalent */
  --c-trim:#A855F7;     /* floorplan-specific — no canonical equivalent */
  --royal:#1A56DB;      /* floorplan-specific — no canonical equivalent */
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:var(--font-body);margin:0;padding:0}
#app{height:100%;max-width:100vw;display:flex;flex-direction:column;color:var(--charcoal);overflow:hidden}

/* TOP BAR */
#topbar{
  height:44px;min-height:44px;background:#111010;border-bottom:1px solid rgba(255,255,255,0.07);
  display:flex;align-items:center;padding:0 16px;gap:0;flex-shrink:0;
}
#topbar .tb-left{display:flex;align-items:center;gap:8px;min-width:160px}
#topbar .tb-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
#topbar .tb-brand{font-family:var(--font-mono);font-size:11px;font-weight:500;color:rgba(255,255,255,0.85);letter-spacing:0.1em}
#topbar .tb-center{flex:1;display:flex;align-items:center;justify-content:center;gap:0;font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,0.4)}
#topbar .tb-center .sep{margin:0 10px;opacity:0.3}
#topbar .tb-center .hi{color:rgba(255,255,255,0.85)}
#topbar .tb-right{display:flex;align-items:center;gap:8px;min-width:160px;justify-content:flex-end}
#app #topbar button{
  background:transparent;color:rgba(255,255,255,0.4);border:none;
  border-radius:4px;padding:4px 8px;cursor:pointer;display:flex;align-items:center;
}
#app #topbar button:hover{color:rgba(255,255,255,0.85);background:rgba(255,255,255,0.06)}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--royal);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;font-weight:500;color:#fff;flex-shrink:0}

/* TOOLBAR */
#toolbar{
  min-height:36px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:8px;flex-shrink:0;overflow-x:auto;
}
#toolbar .tb-trades{display:flex;align-items:center;gap:4px;flex-shrink:0}
#app #toolbar button.trade-btn{
  font-family:var(--font-mono);font-size:10px;font-weight:400;letter-spacing:0.08em;
  background:transparent;border:none;border-bottom:2px solid transparent;
  padding:0 12px;cursor:pointer;color:var(--muted);
  height:36px;transition:all 0.15s;
}
#app #toolbar button.trade-btn:hover{color:var(--mid)}
#app #toolbar button.trade-btn.active{color:var(--charcoal);border-bottom-color:currentColor}
#app #toolbar button.trade-btn.active.t-all{color:var(--charcoal);border-bottom-color:var(--charcoal)}
#app #toolbar button.trade-btn.active.t-paint{color:var(--amber);border-bottom-color:var(--amber)}
#app #toolbar button.trade-btn.active.t-floor{color:var(--c-floor);border-bottom-color:var(--c-floor)}
#app #toolbar button.trade-btn.active.t-trim{color:var(--c-trim);border-bottom-color:var(--c-trim)}
#toolbar .tb-legend{flex:1;display:flex;align-items:center;justify-content:center;gap:14px;flex-shrink:0;min-width:0}
.legend-pill{display:flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:9px;font-weight:400;color:var(--muted);letter-spacing:0.06em;cursor:pointer;background:transparent;border:1px solid transparent;border-radius:4px;padding:3px 8px;transition:all 0.15s}
.legend-pill:hover{color:var(--mid);border-color:var(--accent-border)}
.legend-pill.active{color:var(--charcoal);border-color:var(--accent-border);background:var(--surface-2)}
.legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
#toolbar .tb-hint{font-family:var(--font-mono);font-size:9px;color:var(--muted);letter-spacing:0.04em;white-space:nowrap}

/* MAIN AREA */
#main{flex:1;display:flex;overflow:hidden}

/* PLAN WRAP */
#plan-wrap{
  flex:1;min-width:0;background:var(--bg);overflow:hidden;position:relative;cursor:default;
}
#plan-wrap.grabbing{cursor:grabbing}
#plan-canvas{
  position:absolute;top:0;left:0;width:920px;height:460px;transform-origin:0 0;
}
#plan-canvas svg{display:block;width:100%;height:100%;background:none}

/* ROOM SVG INTERACTIVITY */
#app .room-zone{cursor:pointer}
#app .room-zone:hover .room-bg{filter:brightness(0.97)}
.room-zone.selected .room-bg{stroke:#1A56DB!important;stroke-width:2!important}

/* PROJECT PANEL */
#panel{
  flex:0 0 340px;width:340px;background:var(--surface);border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
#panel-tabs{
  display:flex;border-bottom:1px solid rgba(0,0,0,0.08);flex-shrink:0;background:#F7F6F4;
}
#app #panel-tabs button{
  flex:1;font-family:var(--font-mono);font-size:8px;font-weight:400;letter-spacing:0.04em;
  background:transparent;border:none;border-bottom:2px solid transparent;
  color:var(--muted);padding:0 2px;height:40px;cursor:pointer;transition:all 0.15s;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;
}
#app #panel-tabs button:hover{color:var(--mid)}
#app #panel-tabs button.active{color:var(--charcoal);font-weight:500;border-bottom-color:var(--royal)}
#panel-content{flex:1;overflow-y:auto;padding:12px}
#app #panel-content::-webkit-scrollbar{width:4px}
#app #panel-content::-webkit-scrollbar-track{background:transparent}
#app #panel-content::-webkit-scrollbar-thumb{background:var(--faint);border-radius:2px}

/* ROOM CARDS IN OVERVIEW */
.room-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.room-card{
  background:#FFFFFF;border:1px solid rgba(0,0,0,0.08);border-radius:6px;padding:14px;
  cursor:pointer;transition:border-color 0.15s,background 0.15s;
}
.room-card:hover{border-color:rgba(0,0,0,0.16);background:#FAFAF8}
.room-card-top{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.room-card-name{font-family:var(--font-body);font-size:13px;font-weight:600;color:var(--charcoal);flex:1;line-height:1.2}
.status-badge{font-family:var(--font-mono);font-size:8px;font-weight:400;letter-spacing:0.06em;padding:2px 6px;border-radius:3px}
.prog-bar-wrap{height:3px;background:rgba(0,0,0,0.06);border-radius:2px;margin-bottom:8px;overflow:hidden}
.prog-bar-fill{height:100%;border-radius:2px;transition:width 0.3s}
.room-card-bot{display:flex;align-items:center;justify-content:space-between}
.room-card-pct{font-family:var(--font-mono);font-size:9px;color:var(--muted)}
.room-card-tasks{font-family:var(--font-mono);font-size:9px;color:var(--muted)}
.trade-dots{display:flex;gap:4px;margin-top:6px}
.trade-dot{width:6px;height:6px;border-radius:50%}

/* TASK LIST */
.trade-group{margin-bottom:14px}
.trade-group-header{display:flex;align-items:center;gap:6px;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.trade-group-label{font-family:var(--font-mono);font-size:9px;font-weight:700;letter-spacing:0.15em;color:var(--muted)}
.task-item{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.task-item:last-child{border-bottom:none}
.task-status-circle{width:14px;height:14px;border-radius:50%;border:2px solid;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center}
.task-status-circle.complete{background:var(--green);border-color:var(--green)}
.task-status-circle.complete::after{content:'';width:4px;height:7px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px);display:block}
.task-status-circle.inProgress{border-color:var(--blue);background:transparent}
.task-status-circle.blocked{border-color:var(--red);background:transparent}
.task-status-circle.pending{border-color:var(--c-pending);background:transparent}
.task-label{font-family:var(--font-body);font-size:12px;color:var(--mid);flex:1;line-height:1.4}
.task-meta{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0}
.task-hours{font-family:var(--font-mono);font-size:9px;color:var(--muted);white-space:nowrap}
.task-room-tag{font-family:var(--font-mono);font-size:8px;color:var(--muted);letter-spacing:0.05em;white-space:nowrap}

/* NOTE FEED */
.note-item{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.note-item:last-child{border-bottom:none}
.note-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:9px;font-weight:700;color:#fff;flex-shrink:0}
.note-body-wrap{flex:1;min-width:0}
.note-header{display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap}
.note-author{font-family:var(--font-body);font-size:11px;font-weight:600;color:var(--charcoal)}
.note-time{font-family:var(--font-mono);font-size:9px;color:var(--muted)}
.note-tag{font-family:var(--font-mono);font-size:8px;font-weight:700;letter-spacing:0.1em;padding:1px 5px;border-radius:3px}
.note-tag.SITE{background:rgba(59,130,246,0.2);color:#60A5FA}
.note-tag.NOTE{background:rgba(156,163,175,0.15);color:var(--muted)}
.note-tag.BLOCKER{background:rgba(239,68,68,0.2);color:#F87171}
.note-text{font-family:var(--font-body);font-size:12px;color:var(--mid);line-height:1.5}

/* MATERIALS */
.mat-group{margin-bottom:14px}
.mat-group-header{font-family:var(--font-mono);font-size:9px;font-weight:700;letter-spacing:0.15em;color:var(--muted);margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.mat-item{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid var(--border)}
.mat-item:last-child{border-bottom:none}
.mat-name{font-family:var(--font-body);font-size:12px;color:var(--mid);flex:1}
.mat-sku{font-family:var(--font-mono);font-size:8px;color:var(--muted)}
.mat-qty{font-family:var(--font-mono);font-size:9px;color:var(--muted);white-space:nowrap}
.mat-cost{font-family:var(--font-mono);font-size:10px;color:var(--charcoal);font-weight:500;white-space:nowrap}
.mat-status{font-family:var(--font-mono);font-size:8px;font-weight:600;letter-spacing:0.06em;padding:1px 5px;border-radius:3px;white-space:nowrap}
.mat-status.used{background:rgba(34,197,94,0.15);color:#4ADE80}
.mat-status.partial{background:rgba(59,130,246,0.15);color:#60A5FA}
.mat-status.onsite{background:rgba(245,158,11,0.15);color:#FCD34D}
.mat-status.ordered{background:rgba(168,85,247,0.15);color:#C084FC}

/* ELEVATION CARDS */
.elev-grid{display:grid;grid-template-columns:1fr;gap:12px}
.elev-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;cursor:pointer;transition:border-color 0.15s}
.elev-card:hover{border-color:var(--accent-border)}
.elev-card svg{display:block;width:100%;height:auto}
.elev-label{font-family:var(--font-mono);font-size:9px;font-weight:600;letter-spacing:0.1em;color:var(--muted);padding:6px 8px;border-top:1px solid var(--border)}

/* PHOTO CARDS */
.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.photo-card{background:var(--bg);border:1px solid var(--border);border-radius:6px;aspect-ratio:4/3;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;overflow:hidden;position:relative}
.photo-card:hover{border-color:var(--accent-border)}
.photo-card.photo-filled{padding:0;border-color:var(--border)}
.photo-card.photo-filled img{width:100%;height:100%;object-fit:cover;display:block;border-radius:5px}
.photo-icon{opacity:0.3}
.photo-label{font-family:var(--font-mono);font-size:9px;color:var(--muted);letter-spacing:0.08em}

/* STATUS BAR */
#statusbar{
  height:24px;min-height:24px;background:#F5F3F0;border-top:1px solid rgba(0,0,0,0.08);
  display:flex;align-items:center;padding:0 16px;gap:16px;flex-shrink:0;
}
.sb-item{font-family:var(--font-mono);font-size:9px;color:var(--muted);display:flex;align-items:center;gap:5px}
.sb-item .sb-val{color:var(--mid);font-weight:500}

/* ROOM POPUP */
#room-popup{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:500;
  align-items:center;justify-content:center;
}
#room-popup.open{display:flex}
#popup-card{
  background:#FFFFFF;border:1px solid rgba(0,0,0,0.12);border-radius:8px;
  box-shadow:0 16px 48px rgba(0,0,0,0.14);
  width:min(860px,96vw);height:86vh;display:flex;flex-direction:column;overflow:hidden;
}
#popup-topbar{
  height:52px;min-height:52px;background:#FFFFFF;border-bottom:1px solid rgba(0,0,0,0.08);
  display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;
}
#popup-topbar .pop-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
#popup-topbar .pop-name{font-family:var(--font-body);font-size:18px;font-weight:700;color:#1A1714;letter-spacing:0;flex:1}
#popup-topbar .pop-meta{font-family:var(--font-mono);font-size:10px;color:var(--muted);white-space:nowrap}
#popup-topbar .pop-close{
  background:transparent;border:none;color:var(--muted);font-size:18px;cursor:pointer;
  padding:4px 8px;line-height:1;border-radius:4px;font-family:sans-serif;
}
#popup-topbar .pop-close:hover{color:#1A1714;background:var(--surface-2)}
#popup-body{flex:1;display:flex;overflow:hidden}
#popup-side{width:38%;background:#F7F6F4;border-right:1px solid rgba(0,0,0,0.08);overflow-y:auto;padding:14px}
#popup-side::-webkit-scrollbar{width:3px}
#popup-side::-webkit-scrollbar-thumb{background:#D0D2D6;border-radius:2px}
#popup-viz{flex:1;background:#F0EDE8;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center}
#popup-viz svg{max-width:100%;max-height:100%}
#popup-bottabs{
  height:36px;min-height:36px;background:#F7F6F4;display:flex;flex-shrink:0;
  border-bottom:1px solid rgba(0,0,0,0.08);
}
#popup-bottabs button{
  flex:1;font-family:var(--font-mono);font-size:10px;font-weight:400;letter-spacing:0.08em;
  background:transparent;border:none;outline:none;appearance:none;-webkit-appearance:none;
  border-bottom:2px solid transparent;
  color:var(--muted);cursor:pointer;padding:0 14px;height:36px;transition:all 0.15s;
}
#popup-bottabs button:hover{color:var(--mid)}
#popup-bottabs button.active{color:var(--charcoal);font-weight:500;border-bottom-color:var(--royal)}

/* Popup side panel */
#popup-side .task-item{border-bottom-color:rgba(0,0,0,0.07)}
#popup-side .task-label{color:var(--charcoal);font-size:13px;font-family:var(--font-body)}
#popup-side .task-hours{color:var(--muted)}
#popup-side .task-room-tag{color:var(--muted)}
#popup-side .trade-group-header{border-bottom-color:rgba(0,0,0,0.07)}
#popup-side .trade-group-label{color:var(--muted)}
#popup-side .note-item{border-bottom-color:rgba(0,0,0,0.07)}
#popup-side .note-author{color:var(--charcoal);font-family:var(--font-body)}
#popup-side .note-text{color:var(--mid);font-size:13px;font-family:var(--font-body)}
#popup-side .note-time{color:var(--muted)}
#popup-side .mat-item{border-bottom-color:rgba(0,0,0,0.07)}
#popup-side .mat-name{color:var(--charcoal);font-family:var(--font-body)}
#popup-side .mat-sku{color:var(--muted)}
#popup-side .mat-qty{color:var(--muted)}
#popup-side .mat-cost{color:var(--charcoal)}
#popup-side .mat-group-header{color:var(--muted);border-bottom-color:rgba(0,0,0,0.07)}
#popup-side .elev-card{background:var(--surface-2);border-color:var(--border)}
#popup-side .elev-label{color:var(--muted);border-top-color:var(--border)}
#popup-side .photo-card{background:var(--surface-2);border-color:var(--border)}
#popup-side .photo-label{color:var(--muted)}

/* ELEVATION FULLSCREEN */
#elev-fs{
  display:none;position:fixed;inset:0;background:rgba(17,19,22,0.92);z-index:1000;
  align-items:center;justify-content:center;
}
#elev-fs.open{display:flex}
#elev-fs-card{
  background:#fff;border-radius:6px;max-width:94vw;max-height:88vh;
  padding:20px;position:relative;display:flex;flex-direction:column;align-items:center;gap:12px;
  min-width:500px;
}
#elev-fs-title{font-family:var(--font-mono);font-size:11px;font-weight:500;letter-spacing:0.10em;color:var(--muted)}
#elev-fs-svg-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden}
#elev-fs-svg-wrap svg{max-width:80vw;max-height:70vh;display:block}
#app #elev-fs-close{
  position:absolute;top:12px;right:14px;background:transparent;border:none;
  cursor:pointer;font-size:18px;color:var(--muted);line-height:1;padding:4px;
}
#app #elev-fs-close:hover{color:#1A1714}

/* ── MOBILE ── */
#panel-mobile-header{display:none}
#mobile-nav{display:none}
@media(max-width:640px){
  /* Bottom nav bar */
  #mobile-nav{
    display:flex;height:56px;min-height:56px;flex-shrink:0;
    background:var(--surface);border-top:1px solid rgba(0,0,0,0.08);
  }
  .mnav-btn{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    background:transparent;border:none;cursor:pointer;
    font-family:var(--font-mono);font-size:8px;letter-spacing:0.1em;font-weight:500;
    color:var(--muted);transition:color 0.15s;
  }
  .mnav-btn.active{color:var(--royal)}
  /* Panel — hidden by default, full-screen when active */
  #panel{display:none}
  #panel.mobile-open{
    display:flex;position:fixed;top:0;left:0;right:0;bottom:56px;
    z-index:300;width:100%!important;flex-direction:column;
  }
  #panel-mobile-header{
    display:flex;align-items:center;padding:0 16px;height:48px;min-height:48px;flex-shrink:0;
    border-bottom:1px solid rgba(0,0,0,0.08);background:var(--bg);
    font-family:var(--font-mono);font-size:10px;font-weight:500;
    letter-spacing:0.1em;color:var(--muted);
  }
  /* Simplify topbar */
  #topbar .tb-center{display:none}
  #topbar .tb-left{min-width:0}
  #topbar .tb-right{min-width:0}
  /* Simplify toolbar */
  #toolbar .tb-legend{display:none}
  #toolbar .tb-hint{display:none}
  #toolbar{height:44px;min-height:44px}
  #app #toolbar button.trade-btn{height:44px}
  /* Hide status bar */
  #statusbar{display:none}
  /* Popup — full screen (above bottom nav) */
  #popup-card{
    width:100%;height:calc(100% - 56px);max-width:100%;
    border-radius:0;border:none;box-shadow:none;
  }
  #room-popup{align-items:flex-start}
  /* Popup topbar */
  #popup-topbar .pop-name{font-size:15px}
  #popup-topbar .pop-meta{display:none}
  /* Popup tabs */
  #popup-bottabs{height:44px;min-height:44px}
  #popup-bottabs button{height:44px;font-size:9px;letter-spacing:0.04em;padding:0 6px}
  /* Popup body — viz on top, side scrollable below */
  #popup-body{flex-direction:column}
  #popup-viz{order:-1;flex:0 0 38%;width:100%;height:38%}
  #popup-side{width:100%;flex:1;border-right:none;border-top:1px solid rgba(0,0,0,0.08)}
  /* Elevation fullscreen */
  #elev-fs-card{min-width:0;width:100%;height:100dvh;border-radius:0;padding:16px}

// ── SVG HELPERS ───────────────────────────────────────────────────────────────
function svgEl(tag,attrs){
  const el=document.createElementNS('http://www.w3.org/2000/svg',tag);
  for(const[k,v] of Object.entries(attrs)) el.setAttribute(k,v);
  return el;
}

// ── FLOOR PLANKS ──────────────────────────────────────────────────────────────
function drawPlanks(svg,x,y,w,h,spacing){
  spacing=spacing||14;
  const clip=svgEl('clipPath',{id:'clip-'+Math.random().toString(36).slice(2)});
  const cr=svgEl('rect',{x,y,width:w,height:h});
  clip.appendChild(cr);
  svg.appendChild(clip);
  const g=svgEl('g',{'clip-path':'url(#'+clip.id+')',opacity:'0.28'});
  let row=0;
  for(let ly=y+spacing;ly<y+h;ly+=spacing){
    const offset=(row%2===0)?0:w*0.5;
    const ln=svgEl('line',{x1:x+offset-w,y1:ly,x2:x+w*2,y2:ly,stroke:'#8A8C94','stroke-width':'0.5'});
    g.appendChild(ln);
    row++;
  }
  svg.appendChild(g);
}

// ── DOOR ARC ──────────────────────────────────────────────────────────────────
function drawDoorArc(svg,cx,cy,r,startAngle,sweep){
  // startAngle in degrees, sweep in degrees
  const a1=startAngle*(Math.PI/180);
  const a2=(startAngle+sweep)*(Math.PI/180);
  const x1=cx+r*Math.cos(a1), y1=cy+r*Math.sin(a1);
  const x2=cx+r*Math.cos(a2), y2=cy+r*Math.sin(a2);
  const laf=Math.abs(sweep)>180?1:0;
  const sf=sweep>0?1:0;
  // door leaf line
  const dl=svgEl('line',{x1:cx,y1:cy,x2:x1,y2:y1,stroke:'#666','stroke-width':'0.8',opacity:'0.6'});
  svg.appendChild(dl);
  const arc=svgEl('path',{d:`M ${x1} ${y1} A ${r} ${r} 0 ${laf} ${sf} ${x2} ${y2}`,stroke:'#888',fill:'none','stroke-width':'0.8',opacity:'0.5','stroke-dasharray':'3,2'});
  svg.appendChild(arc);
}

// ── WINDOW ────────────────────────────────────────────────────────────────────
function drawWindow(svg,x,y,w,h){
  // h is wall thickness (~6), w is window width
  const bg=svgEl('rect',{x,y,width:w,height:h,fill:'#B8D4F0',opacity:'0.6'});
  const l1=svgEl('line',{x1:x,y1:y+h*0.33,x2:x+w,y2:y+h*0.33,stroke:'#6090C0','stroke-width':'0.8'});
  const l2=svgEl('line',{x1:x,y1:y+h*0.67,x2:x+w,y2:y+h*0.67,stroke:'#6090C0','stroke-width':'0.8'});
  svg.appendChild(bg);svg.appendChild(l1);svg.appendChild(l2);
}

// ── BUILD MAIN FLOOR PLAN ─────────────────────────────────────────────────────
function buildFloorPlan(){
  const svg=document.getElementById('floor-svg');
  svg.innerHTML='';

  // Defs — hatch pattern for void/mechanical zones
  const defs=svgEl('defs',{});
  const hp=svgEl('pattern',{id:'void-hatch',width:'6',height:'6',patternUnits:'userSpaceOnUse',patternTransform:'rotate(45 0 0)'});
  hp.appendChild(svgEl('line',{x1:'0',y1:'0',x2:'0',y2:'6',stroke:'#AEAFB2','stroke-width':'0.9'}));
  defs.appendChild(hp);
  svg.appendChild(defs);

  // ── INTERIOR FLOOR AREA (L-shaped inner polygon) ──
  svg.appendChild(svgEl('path',{d:'M32,32 L788,32 L788,288 L508,288 L508,428 L32,428 Z',fill:'#F8F8F6'}));

  // ── EXTERIOR WALLS (evenodd donut: outer L minus inner L = wall mass) ──
  svg.appendChild(svgEl('path',{
    'fill-rule':'evenodd',
    fill:'#2A2C30',
    d:'M20,20 L800,20 L800,300 L520,300 L520,440 L20,440 Z M32,32 L788,32 L788,288 L508,288 L508,428 L32,428 Z'
  }));

  // ── VOID ZONES (no-room interior space, hatched) ──
  svg.appendChild(svgEl('rect',{x:520,y:32,width:140,height:168,fill:'url(#void-hatch)','pointer-events':'none'}));
  svg.appendChild(svgEl('rect',{x:520,y:260,width:140,height:28,fill:'url(#void-hatch)','pointer-events':'none'}));

  // ── ROOMS ──
  const roomOrder=['living','hallway','primaryBed','kitchen','bed2','laundry','bathroom'];
  roomOrder.forEach(id=>{
    const d=RDEFS[id];
    const r=ROOMS[id];
    const statusColor=SC[r.status]?SC[r.status].color:'#9CA3AF';
    const sc=SC[r.status];

    const g=svgEl('g',{class:'room-zone',id:'zone-'+id,'data-room':id});

    // White room fill — no status stroke (walls drawn separately)
    const rect=svgEl('rect',{
      x:d.x,y:d.y,width:d.w,height:d.h,
      fill:'#FFFFFF',stroke:'none',
      class:'room-bg',rx:'0'
    });
    g.appendChild(rect);

    // Status bottom-edge line
    g.appendChild(svgEl('rect',{
      x:d.x,y:d.y+d.h-3,width:d.w,height:3,
      fill:statusColor,'pointer-events':'none',
      class:'room-status-line','data-room':id
    }));

    // Floor planks (very subtle)
    drawPlanks(g,d.x+2,d.y+2,d.w-4,d.h-4,14);

    // Trade overlays
    ['paint','floor','trim'].forEach(trade=>{
      if(r.tasks.some(t=>t.trade===trade)){
        g.appendChild(svgEl('rect',{
          x:d.x+1,y:d.y+1,width:d.w-2,height:d.h-2,
          fill:TC[trade],opacity:'0',
          class:'trade-overlay trade-'+trade,
          'data-room':id,'data-trade':trade,
          style:'pointer-events:none'
        }));
      }
    });

    // Status fill overlay (shown on status filter)
    g.appendChild(svgEl('rect',{
      x:d.x,y:d.y,width:d.w,height:d.h,
      fill:statusColor,opacity:'0',
      class:'status-overlay','data-status':r.status,'pointer-events':'none'
    }));

    // Status dot (top-left corner, only color in the room)

// ── STYLE ZONES (trade overlays) ──────────────────────────────────────────────
function styleZones(){
  // Trade overlays — semi-transparent only
  document.querySelectorAll('.trade-overlay').forEach(el=>{
    const trade=el.getAttribute('data-trade');
    el.setAttribute('opacity',(activeTrade!=='all'&&activeTrade===trade)?'0.12':'0');
  });
  // Status overlays — show halftone fill when status filter active
  document.querySelectorAll('.status-overlay').forEach(el=>{
    const s=el.getAttribute('data-status');
    el.setAttribute('opacity',(activeStatus&&activeStatus===s)?'0.12':'0');
  });
  // Room zone dimming
  Object.keys(RDEFS).forEach(id=>{
    const zone=document.getElementById('zone-'+id);
    if(!zone)return;
    let show=true;
    if(activeTrade!=='all'){
      if(!ROOMS[id].tasks.some(t=>t.trade===activeTrade))show=false;
    }
    if(activeStatus&&ROOMS[id].status!==activeStatus)show=false;
    zone.setAttribute('opacity',show?'1':'0.3');
  });
}

function setStatusFilter(s){
  activeStatus=(activeStatus===s)?null:s;
  document.querySelectorAll('.status-btn').forEach(btn=>{
    btn.classList.toggle('active',btn.getAttribute('data-status')===activeStatus);
  });
  styleZones();
}
window.setStatusFilter=setStatusFilter;

// ── OPEN / CLOSE ROOM ─────────────────────────────────────────────────────────
function openRoom(id){
  activeRoom=id;
  activePopupTab='room';
  // Remove selection from all
  document.querySelectorAll('.room-zone').forEach(el=>el.classList.remove('selected'));
  const zone=document.getElementById('zone-'+id);
  if(zone)zone.classList.add('selected');
  // Build popup
  buildPopup(id);
  document.getElementById('room-popup').classList.add('open');
}

function closeRoom(){
  document.getElementById('room-popup').classList.remove('open');
  document.querySelectorAll('.room-zone').forEach(el=>el.classList.remove('selected'));
  activeRoom=null;
}

// ── BUILD POPUP ───────────────────────────────────────────────────────────────
function buildPopup(id){
  const r=ROOMS[id];
  const sc=SC[r.status];
  // Top bar
  document.getElementById('pop-dot').style.background=sc.color;
  document.getElementById('pop-name').textContent=r.name.toUpperCase();
  document.getElementById('pop-meta').textContent=r.dims+' · '+r.area+' · '+sc.label.toUpperCase();
  // Bottom tabs
  document.querySelectorAll('#popup-bottabs button').forEach(btn=>{
    btn.classList.toggle('active',btn.getAttribute('data-ptab2')===activePopupTab);
  });
  // Side + viz
  buildPopupSide(id);
  buildRoomPlan(id);
}

function buildPopupSide(id){
  const side=document.getElementById('popup-side');
  const r=ROOMS[id];
  side.innerHTML='';

  if(activePopupTab==='room'){
    side.appendChild(buildTaskList(r.tasks,false));
  } else if(activePopupTab==='notes'){
    side.appendChild(buildNoteList(r.notes));
  } else if(activePopupTab==='materials'){
    side.appendChild(buildMatList(r.materials));
  } else if(activePopupTab==='elevations'){
    side.appendChild(buildElevMini());
  } else if(activePopupTab==='photos'){
    side.appendChild(buildPhotoGrid(2,activeRoom));
  }
}

// ── BUILD TASK LIST ───────────────────────────────────────────────────────────
function buildTaskList(tasks,showRoom){
  const wrap=document.createElement('div');
  const byTrade={paint:[],floor:[],trim:[]};
  tasks.forEach(t=>{if(byTrade[t.trade])byTrade[t.trade].push(t);});
  ['paint','floor','trim'].forEach(trade=>{
    const tlist=byTrade[trade];
    if(!tlist.length)return;
    const grp=document.createElement('div');
    grp.className='trade-group';
    const hdr=document.createElement('div');
    hdr.className='trade-group-header';
    hdr.innerHTML=`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${TC[trade]};margin-right:6px"></span><span class="trade-group-label">${trade.toUpperCase()}</span>`;
    grp.appendChild(hdr);
    tlist.forEach(t=>{
      const item=document.createElement('div');
      item.className='task-item';
      const circle=document.createElement('div');
      circle.className='task-status-circle '+t.status;
      item.appendChild(circle);
      const lbl=document.createElement('div');
      lbl.className='task-label';
      lbl.textContent=t.label;
      item.appendChild(lbl);
      const meta=document.createElement('div');
      meta.className='task-meta';
      const hrs=document.createElement('div');
      hrs.className='task-hours';
      hrs.textContent=t.hours+'h';
      meta.appendChild(hrs);
      if(showRoom && t.room){
        const rt=document.createElement('div');
        rt.className='task-room-tag';
        rt.textContent=t.room;
        meta.appendChild(rt);
      }
      item.appendChild(meta);
      grp.appendChild(item);
    });
    wrap.appendChild(grp);
  });
  return wrap;
}

// ── BUILD NOTE LIST ───────────────────────────────────────────────────────────
function buildNoteList(notes){
  const wrap=document.createElement('div');
  notes.forEach(n=>{
    const item=document.createElement('div');
    item.className='note-item';
    const av=document.createElement('div');
    av.className='note-avatar';
    av.style.background=n.color;
    av.textContent=n.initials;
    item.appendChild(av);
    const body=document.createElement('div');
    body.className='note-body-wrap';
    const hdr=document.createElement('div');
    hdr.className='note-header';
    hdr.innerHTML=`<span class="note-author">${n.author}</span><span class="note-time">${n.time}</span><span class="note-tag ${n.tag}">${n.tag}</span>`;
    body.appendChild(hdr);
    const txt=document.createElement('div');
    txt.className='note-text';
    txt.textContent=n.body;
    body.appendChild(txt);
    item.appendChild(body);
    wrap.appendChild(item);
  });
  return wrap;
}

// ── ELEVATION SVG ─────────────────────────────────────────────────────────────
function makeElevSvg(label,doors,windows,w,h){
  w=w||420;h=h||180;
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox',`0 0 ${w} ${h}`);
  svg.setAttribute('width',w);
  svg.setAttribute('height',h);
  // bg
  svg.appendChild(svgEl('rect',{x:0,y:0,width:w,height:h,fill:'#F7F6F4'}));
  const floor=h-20, ceiling=20, wallH=floor-ceiling;
  // sky/wall area
  svg.appendChild(svgEl('rect',{x:10,y:ceiling,width:w-20,height:wallH,fill:'#FFFFFF',stroke:'rgba(0,0,0,0.12)','stroke-width':'0.8'}));
  // floor line
  svg.appendChild(svgEl('line',{x1:10,y1:floor,x2:w-10,y2:floor,stroke:'#555','stroke-width':'1.5'}));
  // ceiling line
  svg.appendChild(svgEl('line',{x1:10,y1:ceiling,x2:w-10,y2:ceiling,stroke:'#555','stroke-width':'1'}));
  // left/right wall lines
  svg.appendChild(svgEl('line',{x1:10,y1:ceiling,x2:10,y2:floor,stroke:'#555','stroke-width':'1.5'}));
  svg.appendChild(svgEl('line',{x1:w-10,y1:ceiling,x2:w-10,y2:floor,stroke:'#555','stroke-width':'1.5'}));

  // doors
  doors.forEach(dx=>{
    const dw=28,dh=70;
    const dy=floor-dh;
    svg.appendChild(svgEl('rect',{x:dx,y:dy,width:dw,height:dh,fill:'#D0D4DA',stroke:'#AAA','stroke-width':'0.8'}));
    svg.appendChild(svgEl('line',{x1:dx+dw*0.7,y1:dy+dh*0.4,x2:dx+dw*0.7,y2:dy+dh*0.6,stroke:'#888','stroke-width':'0.7'}));
  });

  // windows
  windows.forEach(([wx,wy])=>{
    const ww=38,wh=38;
    svg.appendChild(svgEl('rect',{x:wx,y:wy,width:ww,height:wh,fill:'#C8DCF0',stroke:'#888','stroke-width':'0.8'}));
    svg.appendChild(svgEl('line',{x1:wx,y1:wy+wh/2,x2:wx+ww,y2:wy+wh/2,stroke:'#888','stroke-width':'0.6'}));
    svg.appendChild(svgEl('line',{x1:wx+ww/2,y1:wy,x2:wx+ww/2,y2:wy+wh,stroke:'#888','stroke-width':'0.6'}));
    // sill
    svg.appendChild(svgEl('line',{x1:wx-3,y1:wy+wh+2,x2:wx+ww+3,y2:wy+wh+2,stroke:'#AAA','stroke-width':'1'}));
  });

  // label
  const lbl=svgEl('text',{x:w/2,y:h-5,'font-family':'"DM Mono",monospace','font-size':'8','font-weight':'400',fill:'#9A8E84','text-anchor':'middle','letter-spacing':'0.08em'});
  lbl.textContent=label;
  svg.appendChild(lbl);

  return svg;
}

const roomPhotos={};
let photoInputTarget=null;

function buildPhotoGrid(cols,roomId){
  const c=cols||2;
  const wrap=document.createElement('div');
  wrap.className='photo-grid';
  wrap.style.gridTemplateColumns=`repeat(${c},1fr)`;
  const photos=roomId?(roomPhotos[roomId]||[]):[];
  const camSvg=`<svg class="photo-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="7" width="18" height="14" rx="2"/><circle cx="12" cy="14" r="3"/><path d="M9 7V5a2 2 0 014 0v2"/></svg>`;
  // Filled photo cards
  photos.forEach(src=>{
    const card=document.createElement('div');
    card.className='photo-card photo-filled';
    const img=document.createElement('img');
    img.src=src;
    card.appendChild(img);
    wrap.appendChild(card);
  });
  // Always show at least one add slot, up to enough to fill a row
  const minSlots=Math.max(1, c - (photos.length % c === 0 ? 0 : photos.length % c));
  const slots=photos.length===0?c*2:minSlots;
  for(let i=0;i<slots;i++){
    const card=document.createElement('div');
    card.className='photo-card';
    card.innerHTML=camSvg+`<span class="photo-label">ADD PHOTO</span>`;
    if(roomId){
      card.addEventListener('click',()=>{
        photoInputTarget=roomId;
        document.getElementById('photo-input').click();
      });
    }
    wrap.appendChild(card);
  }
  return wrap;
}

// Wire file input
document.getElementById('photo-input').addEventListener('change',function(){
  const files=Array.from(this.files);
  if(!photoInputTarget||!files.length)return;
  if(!roomPhotos[photoInputTarget])roomPhotos[photoInputTarget]=[];
  let loaded=0;
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      roomPhotos[photoInputTarget].push(ev.target.result);
      loaded++;
      if(loaded===files.length){
        if(activeRoom)buildPopupSide(activeRoom);
        buildPanelContent();
        document.getElementById('photo-input').value='';
      }
    };
    reader.readAsDataURL(file);
  });
});

// ── ZOOM ONLY (no pan) ──────────────────────────────────────────────────────────
(function initZoom(){
  const wrap=document.getElementById('plan-wrap');
  const canvas=document.getElementById('plan-canvas');
  const svgW=920, svgH=460;
  let scale=1,tx=0,ty=0,minScale=1;

  function applyTransform(){
    canvas.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
  }

  function clamp(s,ox,oy){
    const ww=wrap.clientWidth, wh=wrap.clientHeight;
    const pw=svgW*s, ph=svgH*s;
    // If plan fits inside viewport, center it
    if(pw<=ww) ox=(ww-pw)/2; else { if(ox>0)ox=0; if(ox+pw<ww)ox=ww-pw; }
    if(ph<=wh) oy=(wh-ph)/2; else { if(oy>0)oy=0; if(oy+ph<wh)oy=wh-ph; }
    return {tx:ox,ty:oy};
  }

  function center(){
    const ww=wrap.clientWidth, wh=wrap.clientHeight;
    const fit=Math.min((ww-16)/svgW,(wh-16)/svgH,1);
    minScale=fit; scale=fit;
    const c=clamp(scale,(ww-svgW*scale)/2,(wh-svgH*scale)/2);
    tx=c.tx; ty=c.ty;
    applyTransform();
  }
  setTimeout(center,50);
  window.addEventListener('resize',()=>{ center(); });

  wrap.addEventListener('wheel',e=>{
    e.preventDefault();
    const rect=wrap.getBoundingClientRect();
    const mx=e.clientX-rect.left, my=e.clientY-rect.top;
    const delta=e.deltaY<0?1.1:0.91;
    const newScale=Math.max(minScale,Math.min(3,scale*delta));
    const ratio=newScale/scale;
    const nx=mx-(mx-tx)*ratio, ny=my-(my-ty)*ratio;
    scale=newScale;
    const c=clamp(scale,nx,ny); tx=c.tx; ty=c.ty;
    applyTransform();
  },{passive:false});

  // Pinch-zoom on mobile (no single-finger pan)
  let pinchDist=0;
  wrap.addEventListener('touchstart',e=>{
    if(e.touches.length===2){
      const dx=e.touches[0].clientX-e.touches[1].clientX;
      const dy=e.touches[0].clientY-e.touches[1].clientY;
      pinchDist=Math.hypot(dx,dy);
    }
  },{passive:true});
  wrap.addEventListener('touchmove',e=>{
    if(e.touches.length===2&&pinchDist>0){
      const dx=e.touches[0].clientX-e.touches[1].clientX;
      const dy=e.touches[0].clientY-e.touches[1].clientY;
      const dist=Math.hypot(dx,dy);
      const rect=wrap.getBoundingClientRect();
      const mx=(e.touches[0].clientX+e.touches[1].clientX)/2-rect.left;
      const my=(e.touches[0].clientY+e.touches[1].clientY)/2-rect.top;
      const newScale=Math.max(minScale,Math.min(3,scale*(dist/pinchDist)));
      const ratio=newScale/scale;
      const nx=mx-(mx-tx)*ratio, ny=my-(my-ty)*ratio;
      scale=newScale;pinchDist=dist;
      const c=clamp(scale,nx,ny); tx=c.tx; ty=c.ty;
      applyTransform();
    }
  },{passive:true});
  wrap.addEventListener('touchend',()=>{pinchDist=0;},{passive:true});
})();
